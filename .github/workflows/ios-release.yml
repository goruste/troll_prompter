name: Build TrollStore IPA

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        architecture: 'x64'

    - name: Install dependencies
      run: flutter pub get

    # 第一步：只生成 Flutter 自身的 AOT 核心产物，不碰 Xcode
    - name: Build Flutter AOT Runtime
      run: |
        flutter build ios --simulator --release
        
    # 第二步：强行在云端组装免签的苹果应用目录（Payload 结构）
    - name: Assemble TrollStore Bundle
      run: |
        mkdir -p Payload/Runner.app
        
        # 复制已经编译好的 Flutter 核心框架与资源到我们的空壳中
        cp -r build/ios/iphonesimulator/Runner.app/* Payload/Runner.app/
        
        # 移出模拟器专用的非真机架构，替换为真机所需的瘦身配置
        rm -rf Payload/Runner.app/Frameworks/Flutter.framework/Flutter
        cp -r ${{ env.FLUTTER_ROOT }}/bin/cache/artifacts/engine/ios-release/Flutter.xcframework/ios-arm64/Flutter.framework/Flutter Payload/Runner.app/Frameworks/Flutter.framework/
        
        # 强行打包
        zip -r TrollPrompter.ipa Payload

    # 第三步：上传产物
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TrollStore-Prompter-IPA
        path: TrollPrompter.ipa
