name: Build TrollStore IPA

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        architecture: 'x64'

    - name: Install dependencies
      run: flutter pub get

    # 终极修复：直接通过 --xcconfig-overrides 将底层强制免签参数直接灌入 Flutter 打包流
    - name: Build iOS Application (Unsigned)
      run: |
        echo 'CODE_SIGNING_ALLOWED=NO' >> flutter_build_config.xcconfig
        echo 'CODE_SIGNING_REQUIRED=NO' >> flutter_build_config.xcconfig
        echo 'CODE_SIGN_IDENTITY=' >> flutter_build_config.xcconfig
        
        flutter build ios --no-codesign --release --xcconfig-overrides=flutter_build_config.xcconfig

    # 打包成巨魔专用 IPA
    - name: Convert to TrollStore IPA
      run: |
        mkdir Payload
        cp -r build/ios/iphoneos/Runner.app Payload/
        zip -r TrollPrompter.ipa Payload
        
    # 上传产物
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TrollStore-Prompter-IPA
        path: TrollPrompter.ipa
