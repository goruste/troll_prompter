name: Build TrollStore IPA

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        architecture: 'x64'

    # 自动修复并获取依赖
    - name: Install dependencies
      run: |
        flutter pub add speech_to_text || true
        flutter pub get

    # 关键修复：使用标准的 flutter build，并在命令前注入环境变量，强行彻底瘫痪 Xcode 的签名和 TeamID 校验
    - name: Build iOS Application (Unsigned)
      run: |
        export CODE_SIGNING_ALLOWED=NO
        export CODE_SIGNING_REQUIRED=NO
        export CODE_SIGN_IDENTITY=""
        flutter build ios --no-codesign --release

    # 打包成巨魔专用 IPA
    - name: Convert to TrollStore IPA
      run: |
        mkdir Payload
        cp -r build/ios/iphoneos/Runner.app Payload/
        zip -r TrollPrompter.ipa Payload
        
    # 上传产物
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TrollStore-Prompter-IPA
        path: TrollPrompter.ipa
