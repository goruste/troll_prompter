name: Build TrollStore IPA

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        architecture: 'x64'

    - name: Install dependencies
      run: flutter pub get

    # 关键修复：追加 CODE_SIGNING_ALLOWED=NO 彻底禁用 Xcode 的证书校验
    - name: Build iOS Application (Unsigned)
      run: |
        flutter build ios --no-codesign --release --config-only
        xcodebuild -workspace ios/Runner.xcworkspace -scheme Runner -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""

    # 把编译出来的构建产物打包成巨魔 IPA
    - name: Convert to TrollStore IPA
      run: |
        mkdir Payload
        cp -r build/ios/iphoneos/Runner.app Payload/ || cp -r ios/build/Products/Release-iphoneos/Runner.app Payload/
        zip -r TrollPrompter.ipa Payload
        
    # 上传 IPA
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TrollStore-Prompter-IPA
        path: TrollPrompter.ipa
