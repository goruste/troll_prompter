name: Build TrollStore IPA

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        architecture: 'x64'

    - name: Install dependencies
      run: flutter pub get

    # 核心修复：修改 Xcode 默认配置模板，强行允许免签编译
    - name: Patch Xcode for Non-Codesign
      run: |
        sed -i '' 's/CODE_SIGNING_ALLOWED = YES/CODE_SIGNING_ALLOWED = NO/g' ios/Runner.xcodeproj/project.pbxproj || true
        sed -i '' 's/CODE_SIGNING_REQUIRED = YES/CODE_SIGNING_REQUIRED = NO/g' ios/Runner.xcodeproj/project.pbxproj || true

    # 关键步骤：使用标准的 flutter build，并注入底层免签参数
    - name: Build iOS Application (Unsigned)
      run: |
        flutter build ios --no-codesign --release \
          --extra-front-end-options=--no-implicit-dynamic \
          --build-name=1.0.0 --build-number=1

    # 打包成巨魔专用 IPA
    - name: Convert to TrollStore IPA
      run: |
        mkdir Payload
        cp -r build/ios/iphoneos/Runner.app Payload/
        zip -r TrollPrompter.ipa Payload
        
    # 上传产物
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TrollStore-Prompter-IPA
        path: TrollPrompter.ipa
