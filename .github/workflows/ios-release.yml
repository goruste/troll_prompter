name: Build TrollStore IPA

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        architecture: 'x64'

    - name: Install dependencies
      run: flutter pub get

    # 关键修复：先初始化环境，然后强行把免签参数写进 Flutter 官方的 Generated.xcconfig
    - name: Inject Non-Codesign Config
      run: |
        flutter build ios --config-only --release
        echo 'CODE_SIGNING_ALLOWED=NO' >> ios/Flutter/Generated.xcconfig
        echo 'CODE_SIGNING_REQUIRED=NO' >> ios/Flutter/Generated.xcconfig
        echo 'CODE_SIGN_IDENTITY=' >> ios/Flutter/Generated.xcconfig

    # 使用最标准的编译命令，无参数冲突
    - name: Build iOS Application (Unsigned)
      run: flutter build ios --no-codesign --release

    # 打包成巨魔专用 IPA
    - name: Convert to TrollStore IPA
      run: |
        mkdir Payload
        cp -r build/ios/iphoneos/Runner.app Payload/
        zip -r TrollPrompter.ipa Payload
        
    # 上传产物
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TrollStore-Prompter-IPA
        path: TrollPrompter.ipa
